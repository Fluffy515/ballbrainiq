<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BallBrainIQ Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="account-body">
  <header class="site-header">
    <div class="header-side header-left">
      <a href="index.html" class="header-nav-btn">Back</a>
    </div>

    <div class="header-center">
      <a href="index.html">
        <img src="logo.png" alt="BallBrainIQ Logo" class="logo" />
      </a>
    </div>

    <div class="header-side header-right"></div>
  </header>

  <main class="account-page-shell">
    <section class="account-card">
      <div class="account-card-top">
        <p class="account-eyebrow">BALLBRAINIQ ACCOUNT</p>
        <h1>Your account</h1>
        <p class="account-subtitle">
          Save your arsenal, manage your profile, and see your membership status.
        </p>
      </div>

      <div id="loggedOutView">
        <div class="account-form-grid">
          <div class="form-field">
            <label for="signupName">Display Name</label>
            <input id="signupName" type="text" placeholder="Your display name" />
          </div>

          <div class="form-field">
            <label for="authEmail">Email</label>
            <input id="authEmail" type="email" placeholder="you@example.com" />
          </div>

          <div class="form-field">
            <label for="authPassword">Password</label>
            <input id="authPassword" type="password" placeholder="Enter password" />
          </div>
        </div>

        <div class="account-actions">
          <button id="signupBtn" class="primary-btn" type="button">Create Account</button>
          <button id="loginBtn" class="secondary-btn" type="button">Log In</button>
        </div>
      </div>

      <div id="loggedInView" style="display:none;">
        <div class="account-status-pill">Logged in</div>

        <div class="account-info-grid">
          <div class="account-info-box">
            <h3>Email</h3>
            <p id="accountEmail">—</p>
          </div>

          <div class="account-info-box">
            <h3>Display Name</h3>
            <p id="accountDisplayName">—</p>
          </div>

          <div class="account-info-box">
            <h3>Subscription</h3>
            <p id="subscriptionStatus">Free</p>
          </div>
        </div>

        <div class="account-actions">
          <button id="logoutBtn" class="secondary-btn" type="button">Log Out</button>
          <a href="index.html" class="primary-btn account-link-btn">Return to App</a>
        </div>
      </div>

      <p id="authMessage" class="auth-message"></p>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
